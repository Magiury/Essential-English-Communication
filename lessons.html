<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lessons - E.C.H.O</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Inter',sans-serif;
}

body{
    height:100vh;
    background:#0f172a;
    color:white;
    display:flex;
    flex-direction:column;
}

/* ================= TOP BAR ================= */

.topbar{
    height:65px;
    background:#1e293b;
    display:flex;
    align-items:center;
    padding:0 25px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

/* Logo frame */

.logo-frame{
    height:42px;
    width:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:6px 14px;
    border-radius:10px;
    background:rgba(255,255,255,0.03);
    backdrop-filter:blur(6px);
    transition:.4s;
}

.logo-frame img{
    height:100%;
    width:auto;
    object-fit:contain;
    opacity:.9;
    transition:.4s;
}

.logo-frame:hover{
    background:rgba(255,255,255,0.07);
    transform:translateY(-2px);
}

.logo-frame:hover img{
    opacity:1;
}

/* ================= TABS ================= */

.tabs{
    display:flex;
    gap:30px;
    padding:12px 25px;
    background:#0f172a;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.tab{
    cursor:pointer;
    font-size:13px;
    letter-spacing:1px;
    opacity:.6;
    position:relative;
    transition:.3s;
}

.tab:hover{
    opacity:1;
}

.tab.active{
    opacity:1;
}

.tab.active::after{
    content:"";
    position:absolute;
    bottom:-12px;
    left:0;
    width:100%;
    height:2px;
    background:#38bdf8;
}

/* ================= MAIN ================= */

.main{
    flex:1;
    display:flex;
}

/* ================= SIDEBAR (TOOLS) ================= */

.sidebar{
    width:220px;
    background:#111827;
    padding:22px;
    border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar h3{
    font-size:12px;
    font-weight:400;
    opacity:.5;
    margin-bottom:18px;
    letter-spacing:2px;
    text-transform:uppercase;
}

.tool-item{
    margin-bottom:14px;
    font-size:14px;
    opacity:.75;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
    transition:.3s;
}

.tool-item:hover{
    opacity:1;
    transform:translateX(4px);
    color:#38bdf8;
}

/* ================= FILE AREA ================= */

.files{
    flex:1;
    padding:40px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:35px;
}

/* ================= DOCUMENT STYLE ================= */

.file{
    position:relative;
    height:200px;
    background:linear-gradient(to bottom,#f8fafc,#e2e8f0);
    border-radius:6px;
    padding:20px 15px;
    color:#0f172a;
    cursor:pointer;
    transition:.4s;
    box-shadow:
        0 4px 6px rgba(0,0,0,0.2),
        0 12px 20px rgba(0,0,0,0.25);
}

/* góc gấp giấy */
.file::before{
    content:"";
    position:absolute;
    top:0;
    right:0;
    border-top:25px solid #cbd5e1;
    border-left:25px solid transparent;
}

/* hiệu ứng như để trên kệ */
.file::after{
    content:"";
    position:absolute;
    bottom:-10px;
    left:10%;
    width:80%;
    height:10px;
    background:rgba(0,0,0,0.25);
    filter:blur(6px);
    border-radius:50%;
}

.file:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:
        0 10px 15px rgba(0,0,0,0.3),
        0 25px 35px rgba(0,0,0,0.35);
}

.file i{
    font-size:26px;
    margin-bottom:18px;
    color:#1e293b;
}

.file span{
    font-size:13px;
    font-weight:500;
    word-break:break-word;
}

/* ================= FADE ================= */

.fade{
    animation:fadeIn .4s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(15px);}
    to{opacity:1; transform:translateY(0);}
}

/* RETURN BUTTON */

.return-btn{
    margin-top:25px;
    font-size:13px;
    cursor:pointer;
    opacity:.6;
}

.return-btn:hover{
    opacity:1;
    text-decoration:underline;
}

/* ================= WINDOW SYSTEM ================= */

.window{
    position:absolute;
    width:420px;
    height:350px;
    min-width:300px;
    min-height:200px;
    background:#1e293b;
    border-radius:8px;
    box-shadow:0 20px 40px rgba(0,0,0,.5);
    display:flex;
    flex-direction:column;
    resize:both;
    overflow:auto;   /* đổi từ hidden -> auto */
    z-index:500;
}

.window-header{
    height:40px;
    background:#0f172a;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 12px;
    cursor:move;
}

.close-btn{
    cursor:pointer;
    opacity:.6;
}
.close-btn:hover{opacity:1}

.window-body{
    flex:1;
    padding:15px;
    overflow:auto;
    background:white;
    color:black;
}

.global-return{
    position:fixed;
    bottom:20px;
    left:25px;
    font-size:13px;
    opacity:.6;
    cursor:pointer;
    z-index:2000;
    transition:.3s;
}

.global-return:hover{
    opacity:1;
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="topbar">
    <div class="logo-frame">
        <img src="echo-logo.png" alt="ECHO Logo">
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('listening', this)">Listening</div>
    <div class="tab" onclick="switchTab('speaking', this)">Speaking</div>
    <div class="tab" onclick="switchTab('reading', this)">Reading</div>
    <div class="tab" onclick="switchTab('writing', this)">Writing</div>
</div>

<div class="main">

  <div class="sidebar">
      <h3>Tools</h3>

      <div class="tool-item" onclick="openNote()">
          <i class="fas fa-note-sticky"></i> Notes
      </div>

      <div class="tool-item" onclick="openAI()">
          <i class="fas fa-user-friends"></i> Companion
      </div>

      <div class="tool-item" onclick="openTranscript()">
          <i class="fas fa-file-lines"></i> Transcript
      </div>
  </div>

  <div class="files fade" id="fileContainer"></div>

</div>

<div class="global-return" onclick="window.location.href='index.html'">
    ← Return
</div>

<script>

const fileData = {
    listening:[
        "Daily Conversation.mp3",
        "Podcast Practice.mp3",
        "IELTS Listening 1.mp3",
        "Accent Training.mp3"
    ],
    speaking:[
        "Pronunciation Drill.mp4",
        "Shadowing Exercise.mp4",
        "Public Speaking.mp4"
    ],
    reading:[
        "Short Stories.pdf",
        "News Article.pdf",
        "Academic Passage.pdf"
    ],
    writing:[
        "Essay Practice.docx",
        "Email Writing.docx",
        "Report Structure.docx"
    ]
};

const container = document.getElementById("fileContainer");

function renderFiles(type){
    container.innerHTML="";
    fileData[type].forEach(file=>{
        const div=document.createElement("div");
        div.className="file fade";
        div.innerHTML=`
            <i class="fas fa-file-alt"></i>
            <span>${file}</span>
        `;
        container.appendChild(div);
    });
}

function switchTab(type, el){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");
    renderFiles(type);
}

renderFiles("listening");

let highestZ = 1000;

function createWindow(title, content){
    const win = document.createElement("div");
    win.className = "window";
    win.style.top = "120px";
    win.style.left = "250px";
    win.style.zIndex = highestZ++;

    win.innerHTML = `
        <div class="window-header">
            <span>${title}</span>
            <div class="close-btn">✕</div>
        </div>
        <div class="window-body">${content}</div>
    `;

    document.body.appendChild(win);

    win.querySelector(".close-btn").onclick = () => win.remove();

    const header = win.querySelector(".window-header");

    header.onmousedown = function(e){
        const offsetX = e.clientX - win.offsetLeft;
        const offsetY = e.clientY - win.offsetTop;

        document.onmousemove = function(e){
            win.style.left = e.clientX - offsetX + "px";
            win.style.top = e.clientY - offsetY + "px";
        }

        document.onmouseup = function(){
            document.onmousemove = null;
        }
    }

    win.onclick = () => win.style.zIndex = highestZ++;
}

/* NOTE */
function openNote(){

    const content = `
        <textarea 
            id="noteArea"
            style="
                width:100%;
                height:100%;
                border:none;
                outline:none;
                resize:none;
                font-family:Inter, sans-serif;
                font-size:14px;
                line-height:1.6;
            "
            placeholder="Write anything you want..."
        ></textarea>
    `;

    createWindow("Note", content);

    setTimeout(()=>{
        const area = document.getElementById("noteArea");

        /* Load saved note */
        area.value = localStorage.getItem("echo_note") || "";

        /* Auto save */
        area.addEventListener("input", ()=>{
            localStorage.setItem("echo_note", area.value);
        });

    }, 100);
}

/* TRANSCRIPT */
function openTranscript(){
    const content = `
        <select style="width:100%;padding:8px;margin-bottom:15px">
            <option>Daily Conversation</option>
            <option>Podcast Practice</option>
            <option>IELTS Listening 1</option>
        </select>
        <div>
        Transcript content appears here...
        </div>
    `;
    createWindow("Transcript", content);
}

/* AI */
function openAI(){
    const content = `
        <div>
            <p>AI Companion coming soon...</p>
        </div>
    `;
    createWindow("Companion", content);
}

</script>

</body>
</html>
