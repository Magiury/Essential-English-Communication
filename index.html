<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Essential English Communication</title>

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    color: #333;
}

/* ================= VIDEO BACKGROUND ================= */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* Dark overlay */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: -1;
}

/* ================= APP WRAPPER ================= */
#app {
    position: relative;
    z-index: 2;
    width: 100%;
    text-align: center;
    padding-top: 5px;
    transition: opacity 1.2s ease, transform 1.2s ease;
}

#app.fade-out {
    opacity: 0;
    transform: translateY(-10px);
}

/* ================= SEARCH ================= */
.search-bar {
    margin: 18px auto 10px;
    width: 520px;
    max-width: 90%;
    position: relative;
    opacity: 0;
    transform: translateY(10px);
    animation: searchFade 2s ease forwards;
    animation-delay: 1.3s;
    z-index: 1001;
}

.search-bar input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    outline: none;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(5px);
    color: white;
    font-size: 15px;
    transition: all 0.3s ease;
}

.search-results {
    position: absolute;
    top: 105%;
    left: 0;
    right: 0;
    background: rgba(15, 15, 15, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 6px;
    border: 1px solid rgba(157, 255, 179, 0.2);
    max-height: 280px;
    overflow-y: auto;
    z-index: 1000;
    display: none;
    text-align: left;
}

.result-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: 0.2s;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: white;
}

.result-item:hover {
    background: rgba(157, 255, 179, 0.15);
    color: #9dffb3;
}

/* ================= MENU ================= */
.menu {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 12px;
    opacity: 0;
    animation: menuFade 1.8s ease forwards;
    animation-delay: 1.9s;
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.menu a {
    color: white;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 1px;
    opacity: 0.8;
    transition: all 0.6s ease;
    display: inline-block;
}

.search-active .menu a:nth-child(1),
.search-active .menu a:nth-child(2) { transform: translateX(-150px); opacity: 0; }

.search-active .menu a:nth-child(3),
.search-active .menu a:nth-child(4) { transform: translateX(150px); opacity: 0; }

@keyframes searchFade { 
    from { opacity: 0; transform: translateY(10px); } 
    to { opacity: 1; transform: translateY(0); } 
}

@keyframes menuFade { 
    from { opacity: 0; } 
    to { opacity: 1; } 
}

/* ================= TAB OUT OVERLAY ================= */

#inactiveOverlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 15, 25, 0.75);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 9999;
}

/* Khi active */
#inactiveOverlay.active {
    opacity: 1;
    pointer-events: all;
}

/* Blur toàn bộ app phía sau */
body.inactive #app {
    filter: blur(10px);
    transform: scale(1.01);
    transition: all 0.4s ease;
}

/* Icon chuột */
.inactive-icon {
    font-size: 32px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 18px;
    animation: subtleFloat 2.5s ease-in-out infinite;
}

/* Text giống hình */
.inactive-text {
    font-size: 18px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 1px;
    font-weight: 400;
}

/* Float animation rất nhẹ */
@keyframes subtleFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}

/* =========================
   TOP LEFT LOGO ANIMATION
   ========================= */

#siteLogo{
  position:fixed;
  top:22px;
  left:30px;
  height:70px;
  width:auto;
  z-index:20000;
  opacity:0;
  transform:translateY(-8px);
  transition:opacity 1.2s ease, transform 1.2s ease;
  pointer-events:auto;
}

/* Khi trang load xong */
#siteLogo.show{
  opacity:.95;
  transform:translateY(0);
}

/* Khi rời trang */
#siteLogo.fade-out{
  opacity:0;
  transform:translateY(-10px);
}

/* ================= HERO COUNTER PREMIUM ================= */

.hero-center {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 3;
    pointer-events: none;
    text-align: center;
}

/* SỐ CHÍNH */
.hero-number {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(60px, 7vw, 120px);
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 0 20px rgba(255,255,255,0.08);
    opacity: 0;
    transform: translateY(25px);
    transition: 1.2s cubic-bezier(.19,1,.22,1);
}

/* DÒNG MÔ TẢ */
.hero-sub {
    margin-top: 18px;
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    opacity: 0;
    transform: translateY(20px);
    transition: 1.4s cubic-bezier(.19,1,.22,1);
}

/* QUOTE CLICKABLE */
.hero-quote {
    margin-top: 26px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    pointer-events: auto;
    transition: 0.4s ease;
    opacity: 0;
    transform: translateY(20px);
    position: relative;
}

.hero-quote::after {
    content: "";
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0%;
    height: 1px;
    background: white;
    transition: 0.4s ease;
}

.hero-quote:hover {
    color: white;
    letter-spacing: 1px;
}

.hero-quote:hover::after {
    width: 100%;
}

/* SHOW */
.hero-visible .hero-number,
.hero-visible .hero-sub,
.hero-visible .hero-quote {
    opacity: 1;
    transform: translateY(0);
}

</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body id="mainBody">
  
<img src="echo-logo.png" id="siteLogo" alt="E.C.H.O Logo">

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop playsinline id="bg-video">
    <source src="earth-rotating.mp4" type="video/mp4">
</video>

<div id="inactiveOverlay">
    <div class="inactive-icon">
        <i class="fas fa-mouse"></i>
    </div>
    <div class="inactive-text">
        Press to resume pratice
    </div>
</div>

<div class="hero-center" id="heroSection">
    <div class="hero-number" id="englishCounter">0</div>
    <div class="hero-sub">English Learners Across The Globe</div>
    <div class="hero-quote" onclick="navigate(event, 'lessons.html')">
        BE ONE OF THEM?
    </div>
</div>

<div id="app">

    <div class="search-bar">
        <input type="text" id="ai-search-input" placeholder="🔍︎ Search All Your Need" autocomplete="off">
        <div id="ai-results" class="search-results"></div>
    </div>

    <div class="menu">
        <a href="about.html" onclick="navigate(event, 'about.html', true)">ABOUT US</a>
        <a href="album.html" onclick="navigate(event, 'lessons.html')">LESSONS</a>
        <a href="thought.html" onclick="navigate(event, 'companion.html')">COMPANION</a>
        <a href="chat.html" onclick="navigate(event, 'help.html')">HELP</a>
    </div>
</div>

<script>
const searchInput = document.getElementById('ai-search-input');
const resultsBox = document.getElementById('ai-results');
const mainBody = document.getElementById('mainBody');

const albumKeywords = ['lớp 10', 'lớp 11', 'lớp 12', 'mdmx', 'mừng đảng mừng xuân', 'mđmx', 'culture night', 'cn', 'vhdg', 'văn học dân gian', 'ghat', 'gian hàng ẩm thực'];
const teacherKeywords = ['giáo viên', 'thầy cô', 'nguyễn đình tùng', 'phạm trương thanh tùng', 'trần ngọc bích', 'chủ nhiệm'];

searchInput.addEventListener('focus', () => { mainBody.classList.add('search-active'); });

searchInput.addEventListener('blur', () => {
    setTimeout(() => {
        mainBody.classList.remove('search-active');
        resultsBox.style.display = 'none';
    }, 200);
});

function triggerTransition(url) {
    mainBody.classList.add('navigating');
    document.getElementById("app").classList.add("fade-out");
    siteLogo.classList.remove("show");
    siteLogo.classList.add("fade-out");
    setTimeout(() => { window.location.href = url; }, 1200);
}

searchInput.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    resultsBox.innerHTML = '';
    if (val.length < 1) { 
        resultsBox.style.display = 'none'; 
        return; 
    }

    let found = false;

    albumKeywords.forEach(k => {
        if (k.includes(val)) {
            addResultItem(k.toUpperCase(), 'fa-images', () => {
                triggerTransition(`album.html#${k.replace(/\s/g, '')}`);
            });
            found = true;
        }
    });

    teacherKeywords.forEach(k => {
        if (k.includes(val)) {
            addResultItem(k.toUpperCase(), 'fa-chalkboard-teacher', () => {
                triggerTransition(`about.html#lead`);
            });
            found = true;
        }
    });

    if (!found && val.length > 1) {
        addResultItem(`Tìm cảm nghĩ về: ${val.toUpperCase()}`, 'fa-comment-dots', () => {
            triggerTransition(`thought.html?search=${val}`);
        });
    }

    resultsBox.style.display = resultsBox.innerHTML === '' ? 'none' : 'block';
});

function addResultItem(text, icon, action) {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `<i class="fas ${icon}"></i> <span>${text}</span>`;
    div.onclick = action;
    resultsBox.appendChild(div);
}

function navigate(e, url, isAbout = false) {
    e.preventDefault();
    if(isAbout) document.body.classList.add("sink-in-right");
    triggerTransition(url);
}

const inactiveOverlay = document.getElementById("inactiveOverlay");

/* Khi tab bị rời đi */
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        document.body.classList.add("inactive");
        inactiveOverlay.classList.add("active");
    }
});

/* Click để resume */
inactiveOverlay.addEventListener("click", () => {
    document.body.classList.remove("inactive");
    inactiveOverlay.classList.remove("active");
});

const siteLogo = document.getElementById("siteLogo");

/* Fade in khi load */
window.addEventListener("load", () => {
    setTimeout(() => {
        siteLogo.classList.add("show");
    }, 300); // delay nhẹ cho cinematic effect
});

/* Fade out khi rời trang */
window.addEventListener("beforeunload", () => {
    siteLogo.classList.remove("show");
    siteLogo.classList.add("fade-out");
});

/* ================= COUNTER FULL NUMBER ================= */

const counterEl = document.getElementById("englishCounter");
const heroSection = document.getElementById("heroSection");

function animateCounter(target, duration) {
    const startTime = performance.now();

    function update(currentTime) {
        const progress = Math.min((currentTime - startTime) / duration, 1);
        const value = Math.floor(progress * target);

        counterEl.textContent = formatNumber(value);

        if (progress < 1) {
            requestAnimationFrame(update);
        } else {
            counterEl.textContent = formatNumber(target);
        }
    }

    requestAnimationFrame(update);
}

function formatNumber(num) {
    return num.toLocaleString("en-US");
}

/* Trigger khi load */
window.addEventListener("load", () => {
    setTimeout(() => {
        heroSection.classList.add("hero-visible");
        animateCounter(1500000000, 2500);
    }, 500);
});
</script>

</body>
</html>
